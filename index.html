<body>
    <div class="header">
        <h1>GALERÍA MUSEO</h1>
        <button class="theme-toggle" id="themeBtn">🌙 Modo Oscuro</button>
    </div>

    <div class="gallery" id="gallery"></div>

    <div class="selected-info" id="selectedInfo">
        <p class="empty-message">Selecciona una imagen para ver más detalles</p>
    </div>

    <script>
        const paintings = [
            {
                image: 'images/Ardor_Blossom_Star_Faust.webp',
                title: 'Ardor Blossom Star',
                author: 'Faust',
                year: '2017',
                description: 'Una composición de flores ardientes y estrellas sagradas.'
            },
            {
                image: 'images/Bygone_Days_Ishmael.png',
                title: 'Bygone Days',
                author: 'Ishmael',
                year: '2014',
                description: 'Los tiempos pasados capturados en un momento eterno.'
            },
            {
                image: 'images/profileIcon3591.jpg',
                title: 'Minsito',
                author: 'Min',
                year: '2025',
                description: 'Plata IV'
            }
        ];

        let selectedPainting = null;

        function createGallery() {
            const gallery = document.getElementById('gallery');
            gallery.innerHTML = '';

            paintings.forEach((painting, index) => {
                const item = document.createElement('div');
                item.className = 'gallery-item';
                item.innerHTML = `
                    <div class="frame-container">
                        <div class="image-wrapper">
                            <img src="${painting.image}" alt="${painting.title}">
                        </div>
                        <div class="image-info">
                            <div class="image-title">${painting.title}</div>
                            <div class="image-author">Por: ${painting.author}</div>
                            <div class="image-year">${painting.year}</div>
                        </div>
                    </div>
                `;

                item.addEventListener('click', () => selectPainting(index, item));
                gallery.appendChild(item);
            });
        }

        function selectPainting(index, element) {
            document.querySelectorAll('.gallery-item').forEach(item => {
                item.classList.remove('selected');
            });

            element.classList.add('selected');
            selectedPainting = paintings[index];
            updateSelectedInfo();
        }

        function updateSelectedInfo() {
            const selectedInfo = document.getElementById('selectedInfo');
            if (selectedPainting) {
                selectedInfo.innerHTML = `
                    <h3>${selectedPainting.title}</h3>
                    <p><strong>Autor:</strong> ${selectedPainting.author}</p>
                    <p><strong>Año:</strong> ${selectedPainting.year}</p>
                    <p><strong>Descripción:</strong> ${selectedPainting.description}</p>
                `;
            } else {
                selectedInfo.innerHTML = `<p class="empty-message">Selecciona una imagen para ver más detalles</p>`;
            }
        }

        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
            const themeBtn = document.getElementById('themeBtn');
            
            if (document.body.classList.contains('dark-mode')) {
                themeBtn.textContent = '☀️ Modo Claro';
                localStorage.setItem('theme', 'dark');
            } else {
                themeBtn.textContent = '🌙 Modo Oscuro';
                localStorage.setItem('theme', 'light');
            }
        }

        document.getElementById('themeBtn').addEventListener('click', toggleTheme);

        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'dark') {
            document.body.classList.add('dark-mode');
            document.getElementById('themeBtn').textContent = '☀️ Modo Claro';
        }

        createGallery();
    </script>
</body>
</html>
